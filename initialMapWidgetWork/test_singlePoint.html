<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0f0ee;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  #map-container {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    cursor: grab;
    position: relative;
  }

  #map-container:active { cursor: grabbing; }

  #map-svg {
    width: 100%;
    height: 100%;
  }

  /* ── Basemap paths ── */
  /* Land fill — adjust these selectors to match your QGIS SVG group IDs */
  .basemap path, .basemap polygon {
    fill: #dedad4;
    stroke: #aaa89f;
    stroke-width: 0.4px;
    vector-effect: non-scaling-stroke;
  }

  /* ── Point markers ── */
  .point-group circle.marker {
    fill: #2a6db5;
    stroke: #fff;
    stroke-width: 2px;
    cursor: pointer;
    transition: r 0.15s ease, fill 0.15s ease;
    vector-effect: non-scaling-stroke;
  }
  .point-group:hover circle.marker {
    fill: #1a4d8a;
    r: 9;
  }

  /* ── Tooltip (small, on hover) ── */
  #tooltip {
    position: absolute;
    background: #1c1c1c;
    color: #f5f5f5;
    padding: 5px 9px;
    border-radius: 4px;
    font-size: 12px;
    pointer-events: none;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 10;
  }
  #tooltip.visible { opacity: 1; }

  /* ── Click popup (larger, on click) ── */
  #popup {
    position: absolute;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px 18px;
    min-width: 200px;
    max-width: 280px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    font-size: 13px;
    line-height: 1.5;
    color: #222;
    z-index: 20;
    display: none;
  }
  #popup.visible { display: block; }
  #popup h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #111;
  }
  #popup .coords {
    font-size: 11px;
    color: #888;
    margin-top: 8px;
  }
  #popup-close {
    position: absolute;
    top: 8px; right: 10px;
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: #999;
    line-height: 1;
  }
  #popup-close:hover { color: #333; }

  /* ── Zoom controls ── */
  #zoom-controls {
    position: absolute;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 30;
  }
  #zoom-controls button {
    width: 32px;
    height: 32px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    color: #444;
  }
  #zoom-controls button:hover { background: #f0f0f0; }
</style>
</head>

// The pixel dimensions from your QGIS SVG's viewBox attribute:
//   viewBox="0 0 3869.6981 2993.8994" <- this is the old svg, new one is viewBox="0 0 3859.3703 2978.3313"
const SVG_WIDTH  = 3859.3703;
const SVG_HEIGHT = 2978.3313;

// The geographic extent of your QGIS export (EPSG:4326):
//   xmin, ymin, xmax, ymax  →  minLon, minLat, maxLon, maxLat
const BOUNDS = {
  minLon: 7.65085937,
  minLat: 56.41888524,
  maxLon: 8.38914062,
  maxLat: 56.82111476
};

// Your points data. Add as many objects as you like.
const POINTS = [
  {
    id: 1,
    name: "Sample location",
    lat: 56.62,
    lon: 8.02,
    description: "Add your description here.",
    extra: "Any additional data you want to show."
  }
  // { id: 2, name: "Another point", lat: 56.5, lon: 8.15, description: "...", extra: "..." },
];

// ════════════════════════════════════════════════════════
//  MAP SETUP
// ════════════════════════════════════════════════════════

const container = document.getElementById('map-container');
const svg = d3.select('#map-svg');
const basemap = svg.select('#basemap');
const pointsLayer = svg.select('#points-layer');
const tooltip = document.getElementById('tooltip');
const popup = document.getElementById('popup');

// Set the SVG viewBox to the QGIS pixel coordinate space.
// Both the basemap paths and the projected points will live in this space,
// and d3.zoom() will transform the whole thing together.
svg.attr('viewBox', `0 0 ${SVG_WIDTH} ${SVG_HEIGHT}`);

// Build a Mercator projection that maps lon/lat → the QGIS pixel coordinate space.
// fitExtent([[x0,y0],[x1,y1]], geojson) scales and centres the projection so that
// the geographic bounding box fills the given pixel rectangle exactly.
const projection = d3.geoMercator()
  .fitExtent(
    [[0, 0], [SVG_WIDTH, SVG_HEIGHT]],
    {
      type: 'Feature',
      geometry: {
        type: 'Polygon',
        coordinates: [[
          [BOUNDS.minLon, BOUNDS.minLat],
          [BOUNDS.maxLon, BOUNDS.minLat],
          [BOUNDS.maxLon, BOUNDS.maxLat],
          [BOUNDS.minLon, BOUNDS.maxLat],
          [BOUNDS.minLon, BOUNDS.minLat]
        ]]
      }
    }
  );

// ── Zoom behaviour ──
// Both layers share the same group transform — basemap paths and
// point circles stay perfectly aligned at every zoom level.
const zoomGroup = svg.insert('g', ':first-child').attr('id', 'zoom-group');
zoomGroup.append(() => basemap.node());
zoomGroup.append(() => pointsLayer.node());

const zoom = d3.zoom()
  .scaleExtent([0.5, 64])
  .on('zoom', (event) => {
    zoomGroup.attr('transform', event.transform);
    closePopup();
  });

svg.call(zoom);

// ── Render points ──
function renderPoints() {
  const groups = pointsLayer.selectAll('.point-group')
    .data(POINTS, d => d.id)
    .join('g')
    .attr('class', 'point-group')
    .attr('transform', d => {
      const [x, y] = projection([d.lon, d.lat]);
      return `translate(${x},${y})`;
    });

  groups.append('circle')
    .attr('class', 'marker')
    .attr('r', 7);

  // Hover tooltip
  groups
    .on('mouseover', function(event, d) {
      tooltip.textContent = d.name;
      tooltip.classList.add('visible');
    })
    .on('mousemove', function(event) {
      const rect = container.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      tooltip.style.left = (x + 14) + 'px';
      tooltip.style.top  = (y - 28) + 'px';
    })
    .on('mouseout', function() {
      tooltip.classList.remove('visible');
    })
    .on('click', function(event, d) {
      event.stopPropagation();
      tooltip.classList.remove('visible');
      showPopup(event, d);
    });
}

// ── Popup ──
function showPopup(event, d) {
  document.getElementById('popup-title').textContent = d.name;
  document.getElementById('popup-body').textContent = d.description + (d.extra ? ' ' + d.extra : '');
  document.getElementById('popup-coords').textContent = `${d.lat}° N, ${d.lon}° E`;

  const rect = container.getBoundingClientRect();
  let x = event.clientX - rect.left + 16;
  let y = event.clientY - rect.top - 10;

  // Keep popup on screen
  const pw = 280, ph = 140;
  if (x + pw > rect.width)  x = x - pw - 32;
  if (y + ph > rect.height) y = rect.height - ph - 10;

  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
  popup.classList.add('visible');
}

function closePopup() {
  popup.classList.remove('visible');
}

document.getElementById('popup-close').addEventListener('click', closePopup);
svg.on('click', closePopup);

// ── Zoom buttons ──
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  svg.transition().duration(250).call(zoom.scaleBy, 2);
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  svg.transition().duration(250).call(zoom.scaleBy, 0.5);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
});

// ── Init ──
renderPoints();
</script>
</body>
</html>
