<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0f0ee;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  #map-container {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    cursor: grab;
    position: relative;
  }

  #map-container:active { cursor: grabbing; }

  #map-svg {
    width: 100%;
    height: 100%;
  }

  /* ── Basemap paths ── */
  /* Land fill — adjust these selectors to match your QGIS SVG group IDs */
  .basemap path, .basemap polygon {
    fill: #dedad4;
    stroke: #aaa89f;
    stroke-width: 0.4px;
    vector-effect: non-scaling-stroke;
  }

  /* ── Ring dial markers ── */
  .point-group { cursor: pointer; }

  /* Simple dot — visible when zoomed out (default state) */
  .point-group .dot-marker {
    fill: #2a6db5; stroke: #fff; stroke-width: 1.5px;
    transition: fill 0.15s ease;
  }
  .point-group:hover .dot-marker { fill: #1a4d8a; }

  /* Dial parts — hidden when zoomed out, shown when zoomed in */
  .point-group .dial-bg,
  .point-group .dial-track,
  .point-group .dial-ring,
  .point-group .dial-dot { display: none; }

  /* When the group has .zoomed-in, swap visibility */
  .point-group.zoomed-in .dot-marker { display: none; }
  .point-group.zoomed-in .dial-bg,
  .point-group.zoomed-in .dial-track,
  .point-group.zoomed-in .dial-ring,
  .point-group.zoomed-in .dial-dot { display: block; }

  .point-group .dial-bg {
    fill: #dedad4; stroke: #b0aea8; stroke-width: 1.5px;
    transition: fill 0.15s ease;
  }
  .point-group:hover .dial-bg { fill: #ccc9c2; }
  .point-group .dial-track { fill: none; stroke: #d0cec8; stroke-width: 6px; }
  .point-group .dial-ring {
    fill: none; stroke: #2a6db5; stroke-width: 6px; stroke-linecap: round;
    transition: stroke 0.15s ease;
  }
  .point-group:hover .dial-ring { stroke: #1a4d8a; }
  .point-group .dial-dot { fill: #2a6db5; transition: fill 0.15s ease; }
  .point-group:hover .dial-dot { fill: #1a4d8a; }

  /* ── Tooltip (small, on hover) ── */
  #tooltip {
    position: absolute;
    background: #1c1c1c;
    color: #f5f5f5;
    padding: 5px 9px;
    border-radius: 4px;
    font-size: 12px;
    pointer-events: none;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 10;
  }
  #tooltip.visible { opacity: 1; }

  /* ── Click popup (larger, on click) ── */
  #popup {
    position: absolute;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px 18px;
    min-width: 200px;
    max-width: 280px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    font-size: 13px;
    line-height: 1.5;
    color: #222;
    z-index: 20;
    display: none;
  }
  #popup.visible { display: block; }
  #popup h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #111;
  }
  #popup .coords {
    font-size: 11px;
    color: #888;
    margin-top: 8px;
  }
  #popup-close {
    position: absolute;
    top: 8px; right: 10px;
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: #999;
    line-height: 1;
  }
  #popup-close:hover { color: #333; }

  /* ── Zoom controls ── */
  #zoom-controls {
    position: absolute;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 30;
  }
  #zoom-controls button {
    width: 32px;
    height: 32px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    color: #444;
  }
  #zoom-controls button:hover { background: #f0f0f0; }
</style>
</head>

         id="path122"
         style="fill:#818181;fill-opacity:1" />
      <path
         vector-effect="none"
         fill-rule="evenodd"
         d=""
         id="path123"
         style="fill:#818181;fill-opacity:1" />
    </g>
  </g>
	</g>
  </svg>

  <svg id="markers-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;">
    <g id="points-layer" style="pointer-events:all;"></g>
  </svg>

  <div id="tooltip"></div>
  <div id="popup">
    <button id="popup-close">✕</button>
    <h3 id="popup-title"></h3>
    <div id="popup-body"></div>
    <div class="coords" id="popup-coords"></div>
  </div>

  <div id="zoom-controls">
    <button id="btn-zoom-in">+</button>
    <button id="btn-zoom-out">−</button>
    <button id="btn-reset" title="Reset view" style="font-size:12px">⌂</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  CONFIG — edit these values to match your setup
// ════════════════════════════════════════════════════════

// The pixel dimensions from your QGIS SVG's viewBox attribute:
//   viewBox="0 0 3869.6981 2993.8994" <- this is the old svg, new one is viewBox="0 0 3859.3703 2978.3313"
const SVG_WIDTH  = 3859.3703;
const SVG_HEIGHT = 2978.3313;

// The geographic extent of your QGIS export (EPSG:4326):
//   xmin, ymin, xmax, ymax  →  minLon, minLat, maxLon, maxLat
const BOUNDS = {
  minLon: 7.65085937,
  minLat: 56.41888524,
  maxLon: 8.38914062,
  maxLat: 56.82111476
};

// Your points data. Add as many objects as you like.
// value: 0.0 – 1.0  controls how much of the ring dial is filled (0 = empty, 1 = full)
const POINTS = [
  {
    id: 1,
    name: "Sample location",
    lat: 56.62,
    lon: 8.02,
    value: 0.65,           // ← 0.0 to 1.0
    description: "Add your description here.",
    extra: "Any additional data you want to show."
  }
  // { id: 2, name: "Another point", lat: 56.5, lon: 8.15, value: 0.3, description: "...", extra: "..." },
];

// ════════════════════════════════════════════════════════
//  MAP SETUP
// ════════════════════════════════════════════════════════

const container = document.getElementById('map-container');
const svg = d3.select('#map-svg');
const basemap = svg.select('#basemap');
const pointsLayer = d3.select('#points-layer');
const tooltip = document.getElementById('tooltip');
const popup = document.getElementById('popup');

svg.attr('viewBox', `0 0 ${SVG_WIDTH} ${SVG_HEIGHT}`);

// Mercator projection — maps lon/lat into the QGIS pixel coordinate space
const projection = d3.geoMercator()
  .fitExtent(
    [[0, 0], [SVG_WIDTH, SVG_HEIGHT]],
    {
      type: 'Feature',
      geometry: {
        type: 'Polygon',
        coordinates: [[
          [BOUNDS.minLon, BOUNDS.minLat],
          [BOUNDS.maxLon, BOUNDS.minLat],
          [BOUNDS.maxLon, BOUNDS.maxLat],
          [BOUNDS.minLon, BOUNDS.maxLat],
          [BOUNDS.minLon, BOUNDS.minLat]
        ]]
      }
    }
  );

// ── Zoom behaviour ──
// Only the basemap is in the zoom group. Markers live in a separate
// screen-space SVG overlay and are repositioned manually on every zoom event.
const zoomGroup = svg.insert('g', ':first-child').attr('id', 'zoom-group');
zoomGroup.append(() => basemap.node());

let currentTransform = d3.zoomIdentity;

const zoom = d3.zoom()
  .scaleExtent([0.5, 64])
  .on('zoom', (event) => {
    currentTransform = event.transform;
    zoomGroup.attr('transform', currentTransform);
    repositionMarkers();
    closePopup();
  });

svg.call(zoom);

// ── Convert a point's lon/lat to current screen coordinates ──
// 1. projection() maps lon/lat → QGIS pixel space
// 2. currentTransform.apply() maps QGIS pixel space → zoomed pixel space
// 3. The map SVG scales to fill the container via width/height:100%,
//    so we scale by the ratio of container size to viewBox size.
function toScreenXY(lon, lat) {
  const [px, py] = projection([lon, lat]);
  const [zx, zy] = currentTransform.apply([px, py]);
  const scaleX = container.clientWidth  / SVG_WIDTH;
  const scaleY = container.clientHeight / SVG_HEIGHT;
  return [zx * scaleX, zy * scaleY];
}

// ── Zoom threshold ──
// Below this zoom scale markers show as simple dots; above it, ring dials.
// k=1 is the initial fit. Adjust to taste.
const ZOOM_THRESHOLD = 3;

// ── Marker size constants (screen pixels — fixed regardless of zoom) ──
const R_OUTER = 22;
const R_RING  = 15;
const R_DOT   = 5;

// ── Arc path — start angle baked in, no SVG transform needed ──
function arcPath(value) {
  const v = Math.max(0, Math.min(1, value));
  if (v <= 0) return '';
  if (v >= 1) {
    const r = R_RING;
    return `M 0 ${-r} A ${r} ${r} 0 1 1 0 ${r} A ${r} ${r} 0 1 1 0 ${-r} Z`;
  }
  const angle = v * 2 * Math.PI;
  const x = R_RING * Math.sin(angle);
  const y = -R_RING * Math.cos(angle);
  const large = v > 0.5 ? 1 : 0;
  return `M 0 ${-R_RING} A ${R_RING} ${R_RING} 0 ${large} 1 ${x.toFixed(4)} ${y.toFixed(4)}`;
}

// ── Render markers (called once; repositionMarkers updates positions + mode) ──
// Both dot and dial are always in the DOM — CSS class switches which is visible.
function renderPoints() {
  const groups = pointsLayer.selectAll('.point-group')
    .data(POINTS, d => d.id)
    .join('g')
    .attr('class', 'point-group');

  // Zoomed-out: simple dot
  groups.append('circle').attr('class', 'dot-marker').attr('r', R_DOT);

  // Zoomed-in: ring dial
  groups.append('circle').attr('class', 'dial-bg').attr('r', R_OUTER);
  groups.append('circle').attr('class', 'dial-track').attr('r', R_RING);
  groups.append('path').attr('class', 'dial-ring').attr('d', d => arcPath(d.value || 0));
  groups.append('circle').attr('class', 'dial-dot').attr('r', 3.5);

  groups
    .on('mouseover', function(event, d) {
      const pct = Math.round((d.value || 0) * 100);
      tooltip.textContent = `${d.name} — ${pct}%`;
      tooltip.classList.add('visible');
    })
    .on('mousemove', function(event) {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 14) + 'px';
      tooltip.style.top  = (event.clientY - rect.top  - 28) + 'px';
    })
    .on('mouseout', () => tooltip.classList.remove('visible'))
    .on('click', function(event, d) {
      event.stopPropagation();
      tooltip.classList.remove('visible');
      showPopup(event, d);
    });

  repositionMarkers();
}

// ── Reposition markers and toggle dot vs dial based on current zoom scale ──
function repositionMarkers() {
  const zoomedIn = currentTransform.k >= ZOOM_THRESHOLD;
  pointsLayer.selectAll('.point-group')
    .attr('transform', d => {
      const [sx, sy] = toScreenXY(d.lon, d.lat);
      return `translate(${sx.toFixed(2)},${sy.toFixed(2)})`;
    })
    .classed('zoomed-in', zoomedIn);
}

// ── Popup ──
function showPopup(event, d) {
  document.getElementById('popup-title').textContent = d.name;
  const pct = Math.round((d.value || 0) * 100);
  document.getElementById('popup-body').textContent =
    `${d.description}${d.extra ? ' ' + d.extra : ''}`;
  document.getElementById('popup-coords').textContent =
    `${d.lat}° N, ${d.lon}° E · value: ${pct}%`;

  const rect = container.getBoundingClientRect();
  let x = event.clientX - rect.left + 16;
  let y = event.clientY - rect.top  - 10;
  const pw = 280, ph = 140;
  if (x + pw > rect.width)  x = x - pw - 32;
  if (y + ph > rect.height) y = rect.height - ph - 10;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
  popup.classList.add('visible');
}

function closePopup() { popup.classList.remove('visible'); }

document.getElementById('popup-close').addEventListener('click', closePopup);
svg.on('click', closePopup);

// ── Zoom buttons ──
document.getElementById('btn-zoom-in').addEventListener('click', () =>
  svg.transition().duration(250).call(zoom.scaleBy, 2));
document.getElementById('btn-zoom-out').addEventListener('click', () =>
  svg.transition().duration(250).call(zoom.scaleBy, 0.5));
document.getElementById('btn-reset').addEventListener('click', () =>
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity));

// ── Init ──
renderPoints();
</script>
</body>
</html>
